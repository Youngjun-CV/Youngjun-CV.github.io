	{%- feed_meta -%}
	
	{%- if jekyll.environment == 'production' and site.google_analytics -%}

	{%- endif -%}

	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

	<script type="text/x-mathjax-config">
